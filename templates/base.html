<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Library{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="page-glow page-glow-left"></div>
        <div class="page-glow page-glow-right"></div>

        <header class="topbar">
            <a href="/" class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 17A2.5 2.5 0 0 0 4 19.5V5a2 2 0 0 1 2-2h14v14"></path>
                    </svg>
                </span>
                <span>
                    <strong>Smart Library</strong>
                    <small>Simple book management</small>
                </span>
            </a>

            <nav class="nav-links">
                <a href="/" class="{% block nav_home %}{% endblock %}">Home</a>
                <a href="/books" class="{% block nav_books %}{% endblock %}">Books</a>
                <a href="/add" class="button button-primary nav-button">Add Book</a>
            </nav>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-card">
            <span class="spinner"></span>
            <p>Loading page...</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var overlay = document.getElementById("loadingOverlay");
            var links = document.querySelectorAll("a[href]");
            var forms = document.querySelectorAll("form");

            links.forEach(function (link) {
                link.addEventListener("click", function (event) {
                    var href = link.getAttribute("href");
                    if (!href || href.startsWith("#") || link.target === "_blank" || event.metaKey || event.ctrlKey) {
                        return;
                    }
                    overlay.classList.add("is-visible");
                });
            });

            forms.forEach(function (form) {
                form.addEventListener("submit", function () {
                    overlay.classList.add("is-visible");
                });
            });
        });
    </script>
</body>
</html>
